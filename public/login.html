<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milhas com Edu ✈️ — Entrar</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#0a0e1a; --card:#0d1b2e; --accent:#1565c0; --accent2:#1976d2; --text:#e8eaf6; --muted:#90a4ae; --border:#1a2744; --red:#ef5350; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* estrelas de fundo */
    body::before {
      content:'';
      position:fixed; inset:0; pointer-events:none;
      background:
        radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 15%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 70%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 35%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 55%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,.6) 0%, transparent 100%);
      background-color: var(--bg);
    }
    /* brilho central */
    body::after {
      content:'';
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:600px; height:400px;
      background: radial-gradient(ellipse, rgba(21,101,192,.18) 0%, transparent 70%);
      pointer-events:none;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
      position: relative;
      z-index: 1;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo img {
      height: 64px;
      width: auto;
      filter: drop-shadow(0 4px 16px rgba(100,181,246,.3));
    }
    .login-title {
      text-align: center;
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }
    .form-group label {
      font-size: .78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
    }
    .form-group input {
      background: #060d1a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }
    .form-group input:focus { border-color: var(--accent2); }
    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 15px;
      background: linear-gradient(90deg, #1565c0, #7c4dff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .03em;
      transition: opacity .2s, transform .15s;
    }
    .btn-login:hover { opacity: .9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .error-msg {
      background: rgba(239,83,80,.12);
      border: 1px solid rgba(239,83,80,.35);
      color: #ef9a9a;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: .88rem;
      text-align: center;
      margin-bottom: 20px;
    }
    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: .85rem;
      color: var(--muted);
    }
    .login-footer a { color:#64b5f6; text-decoration:none; font-weight:600; }
    .login-footer a:hover { text-decoration:underline; }
    .login-footer .small { display:block; margin-top:10px; font-size:.75rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <img src="/logo.svg" alt="Milhas com Edu" />
    </div>
    <p class="login-title">Acesso exclusivo — faça login para continuar</p>

    <script>
      var p = new URLSearchParams(location.search);
      var e = p.get('error');
      if (e === '1') {
        document.write('<div class="error-msg">❌ Usuário ou senha incorretos. Tente novamente.</div>');
      } else if (e === 'blocked') {
        document.write('<div class="error-msg">🚫 Sua conta foi bloqueada. Contate o administrador.</div>');
      } else if (e === 'expired') {
        document.write('<div class="error-msg">⏰ Seu acesso expirou. Contate o administrador para renovar.</div>');
      }
    </script>

    <form method="POST" action="/api/login">
      <div class="form-group">
        <label>Usuário</label>
        <input type="text" name="username" placeholder="Digite seu usuário" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="password" placeholder="Digite sua senha" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login">✈️ Entrar</button>
    </form>

    <div class="login-footer">
      <a href="/forgot" style="color:#90caf9;">🔐 Esqueci minha senha</a><br>
      Ainda não tem conta? <a href="/register">Criar conta grátis</a>
      <span class="small">Milhas com Edu — Buscador de Passagens</span>
    </div>
  </div>
</body>
</html>
