<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" width="280" height="72">
  <defs>
    <linearGradient id="planeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#ce93d8"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#ce93d8"/>
    </linearGradient>
  </defs>

  <!-- Avião -->
  <g transform="translate(6, 10)">
    <!-- Fuselagem principal -->
    <path d="M8 26 Q28 14 44 22 L52 22 Q56 22 56 26 Q56 30 52 30 L44 30 Q28 38 8 26 Z"
          fill="url(#planeGrad)"/>
    <!-- Asa superior -->
    <path d="M22 22 Q32 8 48 12 L42 22 Z"
          fill="#64b5f6" opacity="0.85"/>
    <!-- Asa inferior -->
    <path d="M22 30 Q32 44 48 40 L42 30 Z"
          fill="#ce93d8" opacity="0.75"/>
    <!-- Cauda vertical -->
    <path d="M10 22 Q4 16 6 12 L14 18 Z"
          fill="#64b5f6" opacity="0.9"/>
    <!-- Janelas -->
    <circle cx="34" cy="26" r="2.2" fill="white" opacity="0.9"/>
    <circle cx="40" cy="26" r="2.2" fill="white" opacity="0.9"/>
    <circle cx="46" cy="26" r="2.2" fill="white" opacity="0.9"/>
    <!-- Rastro / esteira -->
    <line x1="56" y1="26" x2="72" y2="26" stroke="url(#planeGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="58" y1="22" x2="68" y2="22" stroke="#64b5f6" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <line x1="58" y1="30" x2="68" y2="30" stroke="#ce93d8" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Texto "Milhas com" -->
  <text x="90" y="34" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="url(#textGrad)" letter-spacing="-0.3">Milhas com</text>
  <!-- Texto "Edu" em destaque -->
  <text x="90" y="58" font-family="'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="800" fill="url(#textGrad)" letter-spacing="-0.5">Edu</text>

  <!-- Ponto decorativo / estrela -->
  <circle cx="148" cy="50" r="3" fill="#ce93d8" opacity="0.9"/>
  <circle cx="154" cy="46" r="2" fill="#64b5f6" opacity="0.7"/>
  <circle cx="158" cy="52" r="1.5" fill="#ce93d8" opacity="0.6"/>
</svg>
